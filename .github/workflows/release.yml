name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Build Python sidecar → sidecar.exe ──────────────────────────────────
      - name: Install Python dependencies
        working-directory: python-sidecar
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build Python sidecar with PyInstaller
        working-directory: python-sidecar
        run: pyinstaller sidecar.spec --noconfirm --log-level WARN

      # ── Build Node WhatsApp sidecar ──────────────────────────────────────────
      - name: Install WhatsApp sidecar dependencies
        working-directory: whatsapp-sidecar
        run: npm install

      # ── Build Tauri app ──────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri (NSIS + MSI + Updater)
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      # ── Collect artifacts ────────────────────────────────────────────────────
      - name: Find installers
        id: find
        shell: pwsh
        run: |
          $nsis = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Where-Object { $_.Name -notlike "*_en-US*" } | Select-Object -First 1
          $msi  = Get-ChildItem -Recurse "src-tauri/target/release/bundle/msi"  -Filter "*.msi" | Select-Object -First 1
          # Updater .zip (for tauri-plugin-updater)
          $zip  = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*.nsis.zip" | Select-Object -First 1
          $sig  = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*.nsis.zip.sig" | Select-Object -First 1
          echo "nsis=$($nsis.FullName)"  >> $env:GITHUB_OUTPUT
          echo "msi=$($msi.FullName)"    >> $env:GITHUB_OUTPUT
          echo "zip=$($zip.FullName)"    >> $env:GITHUB_OUTPUT
          echo "sig=$($sig.FullName)"    >> $env:GITHUB_OUTPUT
          echo "nsis_name=$($nsis.Name)" >> $env:GITHUB_OUTPUT

      # ── Generate latest.json for tauri-plugin-updater ───────────────────────
      - name: Generate latest.json
        id: latest_json
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $zip  = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*.nsis.zip" | Select-Object -First 1
          $sig  = Get-ChildItem -Recurse "src-tauri/target/release/bundle/nsis" -Filter "*.nsis.zip.sig" | Select-Object -First 1

          # Read signature
          $signature = ""
          if ($sig -and (Test-Path $sig.FullName)) {
            $signature = Get-Content $sig.FullName -Raw
          }

          # Build download URL
          $zipName = if ($zip) { $zip.Name } else { "CrossPost.Desktop_${version}_x64-setup.nsis.zip" }
          $url = "https://github.com/pilipandr770/Desktop-Poster-/releases/download/$tag/$zipName"

          # Get release notes from git tag message
          $notes = git tag -l --format='%(contents)' $tag 2>$null
          if (-not $notes) { $notes = "CrossPost Desktop $tag" }

          $json = @{
            version = $version
            notes   = $notes
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature.Trim()
                url       = $url
              }
            }
          } | ConvertTo-Json -Depth 5

          New-Item -ItemType Directory -Force "docs/updates/windows-x86_64/x86_64/$version" | Out-Null
          [System.IO.File]::WriteAllText("docs/updates/windows-x86_64/x86_64/$version/index.json", $json, [System.Text.UTF8Encoding]::new($false))

          # Also write a flat latest.json
          [System.IO.File]::WriteAllText("docs/updates/latest.json", $json, [System.Text.UTF8Encoding]::new($false))

          echo "version=$version" >> $env:GITHUB_OUTPUT

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CrossPost Desktop ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          body: |
            ## CrossPost Desktop ${{ github.ref_name }}

            ### Installation (Windows)
            1. Laden Sie `CrossPost.Desktop_${{ github.ref_name }}_x64-setup.exe` herunter
            2. Führen Sie die Datei aus (kein Adminrecht nötig)
            3. CrossPost Desktop starten und Lizenz eingeben

            ### Systemanforderungen
            - Windows 10 / 11 (64-Bit)
            - Internetverbindung für erste Einrichtung

            ### Änderungen
            Vollständige Changelog: [CHANGELOG.md](CHANGELOG.md)
          files: |
            ${{ steps.find.outputs.nsis }}
            ${{ steps.find.outputs.msi }}
            ${{ steps.find.outputs.zip }}
            ${{ steps.find.outputs.sig }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Update landing page + commit latest.json ─────────────────────────────
      - name: Commit updates and landing page
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $nsisName = "${{ steps.find.outputs.nsis_name }}"
          $newUrl = "https://github.com/pilipandr770/Desktop-Poster-/releases/download/$tag/$nsisName"

          # Update landing page download URL
          $html = Get-Content "docs/index.html" -Raw -Encoding UTF8
          $html = $html -replace 'href="https://github\.com/pilipandr770/Desktop-Poster-/releases[^"]*-setup\.exe"', "href=`"$newUrl`""
          [System.IO.File]::WriteAllText("docs/index.html", $html, [System.Text.UTF8Encoding]::new($false))

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: release $tag — update landing + latest.json"
            git push origin HEAD:master
          }
